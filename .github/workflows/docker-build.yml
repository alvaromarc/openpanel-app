name: Docker Build and Push

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      # README and docs
      - "**/README*"
      - "**/readme*"
      - "**/*.md"
      - "**/docs/**"
      - "**/CHANGELOG*"
      - "**/LICENSE*"
      # Test files
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/__tests__/**"
      - "**/tests/**"
      # SDKs (published separately)
      - "packages/sdks/**"
      # Public app (docs/marketing, not part of Docker deploy)
      - "apps/public/**"
      # Dev / tooling
      - "**/.vscode/**"
      - "**/.cursor/**"
      - "**/.env.example"
      - "**/.env.*.example"
      - "**/.gitignore"
      - "**/.eslintignore"
      - "**/.prettierignore"

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
  REPO_B_REPOSITORY: ${{ vars.REPO_B_REPOSITORY }}
  REPO_B_VALUES_FILE: clusters/local/values/openpanel.values.yaml # archivo interno al proyecto

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Codegen
        run: pnpm codegen

      - name: Run Biome
        run: pnpm lint

      - name: Run TypeScript checks
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build-and-push-api:
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      deploy_tag: ${{ steps.deploy-tag.outputs.deploy_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy tag
        id: deploy-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            DEPLOY_TAG="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            DEPLOY_TAG="sha-${SHORT_SHA}"
          fi
          echo "deploy_tag=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "Using deploy tag: ${DEPLOY_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-api:${{ steps.deploy-tag.outputs.deploy_tag }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-worker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy tag
        id: deploy-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            DEPLOY_TAG="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            DEPLOY_TAG="sha-${SHORT_SHA}"
          fi
          echo "deploy_tag=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "Using deploy tag: ${DEPLOY_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-worker:${{ steps.deploy-tag.outputs.deploy_tag }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-dashboard:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy tag
        id: deploy-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            DEPLOY_TAG="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            DEPLOY_TAG="sha-${SHORT_SHA}"
          fi
          echo "deploy_tag=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "Using deploy tag: ${DEPLOY_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-dashboard
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/start/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-dashboard:${{ steps.deploy-tag.outputs.deploy_tag }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NO_CLOUDFLARE=1

  promote-repo-b:
    needs:
      - build-and-push-api
      - build-and-push-worker
      - build-and-push-dashboard
    runs-on: ubuntu-latest
    if: ${{ env.REPO_B_REPOSITORY != '' && env.REPO_B_VALUES_FILE != '' }}
    steps:
      - name: Resolve deploy tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            DEPLOY_TAG="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            DEPLOY_TAG="sha-${SHORT_SHA}"
          fi
          echo "deploy_tag=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "Using deploy tag: ${DEPLOY_TAG}"

      - name: Checkout Repo B
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_B_REPOSITORY }}
          token: ${{ secrets.REPO_B_TOKEN }}
          path: repo-b

      - name: Install yq
        shell: bash
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in Repo B
        shell: bash
        run: |
          cd repo-b
          TAG="${{ steps.tag.outputs.deploy_tag }}"
          yq -i '.images.api.tag = strenv(TAG)' "${{ env.REPO_B_VALUES_FILE }}"
          yq -i '.images.dashboard.tag = strenv(TAG)' "${{ env.REPO_B_VALUES_FILE }}"
          yq -i '.images.worker.tag = strenv(TAG)' "${{ env.REPO_B_VALUES_FILE }}"
          git diff -- "${{ env.REPO_B_VALUES_FILE }}"

      - name: Commit and push branch
        id: commit-push
        shell: bash
        run: |
          cd repo-b
          BRANCH="chore/update-openpanel-${{ steps.tag.outputs.deploy_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${BRANCH}"

          git add "${{ env.REPO_B_VALUES_FILE }}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update OpenPanel images to ${{ steps.tag.outputs.deploy_tag }}"
          git push --force-with-lease origin "${BRANCH}"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update Pull Request
        if: ${{ steps.commit-push.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.REPO_B_TOKEN }}
        shell: bash
        run: |
          cd repo-b
          BRANCH="${{ steps.commit-push.outputs.branch }}"

          EXISTING_PR="$(gh pr list \
            --repo "${{ env.REPO_B_REPOSITORY }}" \
            --head "${BRANCH}" \
            --json number \
            --jq '.[0].number')"

          if [[ -n "${EXISTING_PR}" && "${EXISTING_PR}" != "null" ]]; then
            echo "PR already exists: #${EXISTING_PR}"
          else
            gh pr create \
              --repo "${{ env.REPO_B_REPOSITORY }}" \
              --title "chore: update OpenPanel images to ${{ steps.tag.outputs.deploy_tag }}" \
              --body "Automated image update from Repo A." \
              --base main \
              --head "${BRANCH}"
          fi
