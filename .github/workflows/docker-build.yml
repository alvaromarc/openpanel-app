name: Docker Build and Push

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      # README and docs
      - "**/README*"
      - "**/readme*"
      - "**/*.md"
      - "**/docs/**"
      - "**/CHANGELOG*"
      - "**/LICENSE*"
      # Test files
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/__tests__/**"
      - "**/tests/**"
      # SDKs (published separately)
      - "packages/sdks/**"
      # Public app (docs/marketing, not part of Docker deploy)
      - "apps/public/**"
      # Dev / tooling
      - "**/.vscode/**"
      - "**/.cursor/**"
      - "**/.env.example"
      - "**/.env.*.example"
      - "**/.gitignore"
      - "**/.eslintignore"
      - "**/.prettierignore"

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
  REPO_B_REPOSITORY: ${{ vars.REPO_B_REPOSITORY }}
  REPO_B_VALUES_FILE: clusters/local/values/openpanel.values.yaml # archivo interno al proyecto

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Codegen
        run: pnpm codegen

      # Dejamos fuera el quality gate ya que trabajamos con código upstream externo.
      # Nuestro foco es la automatización del ciclo completo de build, release y despliegue mediante GitOps.
      # Así, los quality gates del código se encuentran fueran de nuestro scope.

      # - name: Run checks
      #   run: pnpm check

      # - name: Run TypeScript checks
      #   run: pnpm typecheck

      # - name: Run tests
      #   run: pnpm test

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      is_release: ${{ steps.version.outputs.is_release }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
    steps:
      - name: Resolve semantic version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a tag push: semver publication and GitOps promotion are skipped."
            exit 0
          fi

          RAW_TAG="${GITHUB_REF_NAME}"
          if [[ ! "$RAW_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected a SemVer tag in the form vMAJOR.MINOR.PATCH, got: $RAW_TAG"
            exit 1
          fi

          VERSION="${RAW_TAG#v}"
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${VERSION}"

  build-and-push-api:
    needs:
      - lint-and-test
      - resolve-version
    if: ${{ needs.resolve-version.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-api:${{ needs.resolve-version.outputs.semver }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-api:${{ needs.resolve-version.outputs.major }}.${{ needs.resolve-version.outputs.minor }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-api:${{ needs.resolve-version.outputs.major }}
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-worker:
    needs:
      - lint-and-test
      - resolve-version
    if: ${{ needs.resolve-version.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-worker:${{ needs.resolve-version.outputs.semver }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-worker:${{ needs.resolve-version.outputs.major }}.${{ needs.resolve-version.outputs.minor }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-worker:${{ needs.resolve-version.outputs.major }}
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-dashboard:
    needs:
      - lint-and-test
      - resolve-version
    if: ${{ needs.resolve-version.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/start/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-dashboard:${{ needs.resolve-version.outputs.semver }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-dashboard:${{ needs.resolve-version.outputs.major }}.${{ needs.resolve-version.outputs.minor }}
            ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/openpanel-dashboard:${{ needs.resolve-version.outputs.major }}
          build-args: |
            NO_CLOUDFLARE=1

  promote-repo-b:
    needs:
      - resolve-version
      - build-and-push-api
      - build-and-push-worker
      - build-and-push-dashboard
    if: ${{ needs.resolve-version.outputs.is_release == 'true' && vars.REPO_B_REPOSITORY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo B
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_B_REPOSITORY }}
          token: ${{ secrets.REPO_B_TOKEN }}
          fetch-depth: 0

      - name: Install yq
        shell: bash
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in Repo B
        shell: bash
        run: |
          TAG="${{ needs.resolve-version.outputs.semver }}"
          yq -i ".images.api.tag = \"${TAG}\"" "${{ env.REPO_B_VALUES_FILE }}"
          yq -i ".images.dashboard.tag = \"${TAG}\"" "${{ env.REPO_B_VALUES_FILE }}"
          yq -i ".images.worker.tag = \"${TAG}\"" "${{ env.REPO_B_VALUES_FILE }}"
          git diff -- "${{ env.REPO_B_VALUES_FILE }}"

      - name: Create Pull Request in Repo B
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REPO_B_TOKEN }}
          commit-message: "chore: promote OpenPanel ${{ needs.resolve-version.outputs.semver }}"
          branch: "chore/promote-openpanel-${{ needs.resolve-version.outputs.semver }}"
          delete-branch: true
          title: "chore: promote OpenPanel ${{ needs.resolve-version.outputs.semver }}"
          body: |
            ## Resumen

            Este PR actualiza los tags de imagen de OpenPanel en el repositorio GitOps con la nueva release SemVer `${{ needs.resolve-version.outputs.semver }}`.

            ## Cambios

            - API → `${{ needs.resolve-version.outputs.semver }}`
            - Dashboard → `${{ needs.resolve-version.outputs.semver }}`
            - Worker → `${{ needs.resolve-version.outputs.semver }}`

            ## Origen

            PR generado automáticamente desde Repo A tras publicar imágenes versionadas en GHCR.
          base: main
          add-paths: |
            ${{ env.REPO_B_VALUES_FILE }}
